name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install EJS
        run: npm install ejs

      - name: Build site
        run: node build.js

      - name: List output files
        run: |
          echo "=== HTML Files ==="
          ls -la *.html
          echo "=== CSS Files ==="
          ls -la css/
          echo "=== Checking index.html ==="
          head -10 index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
        id: pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment