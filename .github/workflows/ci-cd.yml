name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install EJS
        run: npm install ejs

      - name: Build Static Site
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const ejs = require('ejs');
            
            const viewsDir = 'views';
            const outputDir = 'dist';
            
            if (!fs.existsSync(outputDir)) fs.mkdirSync(outputDir);
            if (!fs.existsSync(outputDir + '/css')) fs.mkdirSync(outputDir + '/css');
            
            fs.copyFileSync('public/css/style.css', outputDir + '/css/style.css');
            
            const pages = ['home', 'about', 'skills', 'projects', 'contact'];
            const pageNames = { home: 'Home', about: 'About', skills: 'Skills', projects: 'Projects', contact: 'Contact' };
            
            pages.forEach(page => {
              const template = fs.readFileSync(path.join(viewsDir, page + '.ejs'), 'utf8');
              
              // Update links to use .html extension for static site
              let html = template
                .replace(/href=\"\//g, 'href=\"')
                .replace(/href=\"\//g, 'href=\"')
                .replace(/href=\"/g, 'href=\"' + page + '.html')
                .replace(/href=\"\//g, 'href=\"');
              
              html = html.replace(/<a href=\"\/about\">/g, '<a href=\"about.html\">')
                         .replace(/<a href=\"\/skills\">/g, '<a href=\"skills.html\">')
                         .replace(/<a href=\"\/projects\">/g, '<a href=\"projects.html\">')
                         .replace(/<a href=\"\/contact\">/g, '<a href=\"contact.html\">')
                         .replace(/<a href=\"\/\">/g, '<a href=\"home.html\">');
              
              // Keep the homepage link pointing to home.html
              html = html.replace(/href=\"\/\"/g, 'href=\"home.html\"');
              
              const rendered = ejs.render(html, {});
              fs.writeFileSync(path.join(outputDir, page + '.html'), rendered);
              console.log('Built: ' + page + '.html');
            });
          "

      - name: Verify build output
        run: ls -la dist/ && ls -la dist/css/

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test || echo "No tests configured"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install EJS
        run: npm install ejs

      - name: Build Static Site
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const ejs = require('ejs');
            
            const viewsDir = 'views';
            const outputDir = 'dist';
            
            if (!fs.existsSync(outputDir)) fs.mkdirSync(outputDir);
            if (!fs.existsSync(outputDir + '/css')) fs.mkdirSync(outputDir + '/css');
            
            fs.copyFileSync('public/css/style.css', outputDir + '/css/style.css');
            
            const pages = ['home', 'about', 'skills', 'projects', 'contact'];
            
            pages.forEach(page => {
              const template = fs.readFileSync(path.join(viewsDir, page + '.ejs'), 'utf8');
              
              let html = template
                .replace(/href=\"\//g, 'href=\"')
                .replace(/href=\"/g, 'href=\"' + page + '.html');
              
              html = html.replace(/<a href=\"\/about\">/g, '<a href=\"about.html\">')
                         .replace(/<a href=\"\/skills\">/g, '<a href=\"skills.html\">')
                         .replace(/<a href=\"\/projects\">/g, '<a href=\"projects.html\">')
                         .replace(/<a href=\"\/contact\">/g, '<a href=\"contact.html\">')
                         .replace(/<a href=\"\/\">/g, '<a href=\"home.html\">');
              
              html = html.replace(/href=\"\/\"/g, 'href=\"home.html\"');
              
              const rendered = ejs.render(html, {});
              fs.writeFileSync(path.join(outputDir, page + '.html'), rendered);
            });
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4